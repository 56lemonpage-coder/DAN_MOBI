<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>캐릭터 아카이브</title>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+KR:wght@300;400;600&family=Noto+Sans+KR:wght@300;400;500&display=swap" rel="stylesheet">
  <style>
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
    :root{--bg-primary:#ffffff;--bg-secondary:#f7f6f3;--text-primary:#1a1a1a;--text-secondary:#555550;--text-tertiary:#999992;--border-light:rgba(0,0,0,0.08);--border-mid:rgba(0,0,0,0.15);--radius-md:8px;--radius-lg:12px;}
    @media(prefers-color-scheme:dark){:root{--bg-primary:#1c1c1c;--bg-secondary:#252525;--text-primary:#f0f0ee;--text-secondary:#aaaaaa;--text-tertiary:#666660;--border-light:rgba(255,255,255,0.08);--border-mid:rgba(255,255,255,0.15);}}
    body{background:var(--bg-secondary);color:var(--text-primary);font-family:'Noto Sans KR',sans-serif;min-height:100vh;padding:2rem 1.5rem 4rem;}
    .site-wrap{max-width:900px;margin:0 auto;}
    .site-header{display:flex;align-items:center;margin-bottom:2.5rem;padding-bottom:1.25rem;border-bottom:0.5px solid var(--border-light);}
    .site-title{font-family:'Noto Serif KR',serif;font-size:22px;font-weight:400;letter-spacing:0.06em;}
    .site-title span{font-size:13px;font-weight:300;color:var(--text-tertiary);margin-left:10px;}
    .character-card{background:var(--bg-primary);border:0.5px solid var(--border-light);border-radius:var(--radius-lg);margin-bottom:1.5rem;overflow:hidden;transition:border-color 0.2s,box-shadow 0.2s;}
    .character-card:hover{border-color:var(--border-mid);box-shadow:0 2px 16px rgba(0,0,0,0.06);}
    .card-main{display:grid;grid-template-columns:210px 1fr;min-height:320px;}
    .card-image-area{background:var(--bg-secondary);border-right:0.5px solid var(--border-light);display:flex;align-items:center;justify-content:center;flex-direction:column;padding:1.25rem;}
    .char-img{width:100%;height:260px;object-fit:cover;border-radius:var(--radius-md);display:block;}
    .img-empty{width:100%;height:260px;border-radius:var(--radius-md);background:var(--bg-secondary);display:flex;align-items:center;justify-content:center;}
    .img-empty svg{opacity:0.15;}
    .card-info-area{padding:1.5rem;display:flex;flex-direction:column;gap:12px;}
    .char-name{font-family:'Noto Serif KR',serif;font-size:20px;font-weight:400;color:var(--text-primary);}
    .char-tag{font-size:11px;padding:3px 10px;border-radius:20px;border:0.5px solid var(--border-mid);color:var(--text-secondary);display:inline-block;}
    .char-name-row{display:flex;align-items:flex-start;justify-content:space-between;gap:8px;}
    .char-divider{height:0.5px;background:var(--border-light);}
    .char-meta{display:grid;grid-template-columns:1fr 1fr;gap:6px 12px;}
    .meta-item{display:flex;align-items:center;gap:6px;}
    .meta-label{font-size:11px;color:var(--text-tertiary);white-space:nowrap;min-width:28px;}
    .meta-value{font-size:13px;color:var(--text-secondary);}
    .char-desc{font-size:14px;line-height:1.8;color:var(--text-secondary);}
    .card-audio-area{border-top:0.5px solid var(--border-light);padding:1rem 1.5rem;background:var(--bg-secondary);display:flex;flex-direction:column;gap:8px;}
    .audio-section-label{font-size:11px;font-weight:500;color:var(--text-tertiary);text-transform:uppercase;letter-spacing:0.1em;}
    .audio-slots{display:flex;flex-direction:column;gap:8px;}
    .audio-player-wrap audio{width:100%;height:32px;border-radius:var(--radius-md);display:block;}
    .card-gallery-area{border-top:0.5px solid var(--border-light);padding:1rem 1.5rem;background:var(--bg-primary);display:flex;flex-direction:column;gap:10px;}
    .gallery-area-label{font-size:11px;font-weight:500;color:var(--text-tertiary);text-transform:uppercase;letter-spacing:0.1em;}
    .gallery-grid{display:grid;grid-template-columns:repeat(5,1fr);gap:8px;}
    .gallery-item{aspect-ratio:1/1;border-radius:var(--radius-md);overflow:hidden;border:0.5px solid var(--border-light);cursor:pointer;}
    .gallery-item img{width:100%;height:100%;object-fit:cover;display:block;transition:opacity 0.2s;}
    .gallery-item:hover img{opacity:0.85;}
    .lightbox{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.88);z-index:200;align-items:center;justify-content:center;}
    .lightbox.open{display:flex;}
    .lightbox img{max-width:90vw;max-height:90vh;border-radius:var(--radius-md);object-fit:contain;}
    .lightbox-close{position:absolute;top:1.5rem;right:1.5rem;background:none;border:none;color:#fff;font-size:24px;cursor:pointer;opacity:0.7;}
    .lightbox-close:hover{opacity:1;}
    @media(max-width:620px){.card-main{grid-template-columns:1fr;}.card-image-area{border-right:none;border-bottom:0.5px solid var(--border-light);}.char-meta{grid-template-columns:1fr;}.gallery-grid{grid-template-columns:repeat(4,1fr);}}
  </style>
</head>
<body>
<div class="site-wrap">
  <div class="site-header">
    <div class="site-title">캐릭터 아카이브 <span>Character Archive</span></div>
  </div>
  <div id="char-list"></div>
</div>

  <button class="lightbox-close" onclick="event.stopPropagation();closeLightbox()">✕</button>

</div>

const characters=[{"id":"char_1773419444323_dxf6o","name":"단(DAN)","tag":"#정중,능글,여유,의문스러운","job":"음유시인","gender":"남성","age":"30대","height":"187","desc":"음유시인으로 활동하는 모험가\n나이도 이름도 알려진게 없으나, 자신을 늘 단이라고 소개한다.\n\n감정변화 폭이 적고 늘 웃는 낯으로 상대를 대한다. 나이불문 존대를 사용하며, 정중한 태도로 상대를 대하기에 누구나 호감을 가질법하지만 아무래도 알려진 정보가 적다보니 의문스럽게 느껴진다는 평이 종종 있다 음유시인이라는 직업과는 달리 전투에 있어서 제법 과격한 면모가 있으며, 몸에 흉터가 많이 보기 좋지 못하다며 최대한 긴팔로 가리곤 한다.\n\n체격이 꽤나 다부지면서도 유연한편이다. 몸에도 흉터가 많은데 특히 손에 굳은살과 상처가 많다. 이는 류트를 오래 잡아서라기 보단 다른 이유도 있는듯 하다. 이유에 대해 묻는다 한들 그가 사실대로 이야기 해줄지는 모르겠지만. 가끔씩 오른쪽 눈에 안대를 착용할때가 있다.\n\n말하는것보단 듣는걸 좋아하며, 정중하다고 하지만 그게 만만하게 굴만한 사람은 아니었다. 친절한 인간상을 띄우고, 조심스레 상대에 대해 알아가는것이 단이 세상을 살아가는 방식 중 하나라고 할 수 있다.\n\n던바튼에 위치한 주점 <고양이수염> 에서 자주 볼 수 있다. 그 주점에서 판매하는 음식이 본인 취향에 맞는지 종종 그곳에서 식사를 하거나 쉬고 있는 단을 만날 수 있다.","imageSrc":"data:image/jpeg;base64,/9j/4AAQSkZJRgABAQAAAQABAAD/4gHYSUNDX1BST0ZJTEUAAQEAAAHIAAAAAAQwAABtbnRyUkdCIFhZWiAH4AABAAEAAAAAAABhY3NwAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAQAA9tYAAQAAAADTLQAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAlkZXNjAAAA8AAAACRyWFlaAAABFAAAABRnWFlaAAABKAAAABRiWFlaAAABPAAAABR3dHB0AAABUAAAABRyVFJDAAABZAAAAChnVFJDAAABZAAAAChiVFJDAAABZAAAAChjcHJ0AAABjAAAADxtbHVjAAAAAAAAAAEAAAAMZW5VUwAAAAgAAAAcAHMAUgBHAEJYWVogAAAAAAAAb6IAADj1AAADkFhZWiAAAAAAAABimQAAt4UAABjaWFlaIAAAAAAAACSgAAAPhAAAts9YWVogAAAAAAAA9tYAAQAAAADTLXBhcmEAAAAAAAQAAAACZmYAAPKnAAANWQAAE9AAAApbAAAAAAAAAABtbHVjAAAAAAAAAAEAAAAMZW5VUwAAACAAAAAcAEcAbwBvAGcAbABlACAASQBuAGMALgAgADIAMAAxADb/2wBDAAYEBAUEBAYFBQUGBgYHCQ4JCQgICRINDQoOFRIWFhUSFBQXGiEcFxgfGRQUHScdHyIjJSUlFhwpLCgkKyEkJST/2wBDAQYGBgkICREJCREkGBQYJCQkJCQkJCQkJCQkJCQkJCQkJCQkJCQkJCQkJCQkJCQkJCQkJCQkJCQkJCQkJCQkJCT/wAARCAE7AlgDASIAAhEBAxEB/8QAHAAAAAcBAQAAAAAAAAAAAAAAAAECAwQFBgcI/8QAShAAAQMDAgQDBQUFBQYFAwUAAQACAwQFERIhBjFBURMiYQcUcYGRMkKhscEVI1LR8CQzYoLhCBZDcpKyU3OiwvElNMMXNTZjdP/EABoBAAIDAQEAAAAAAAAAAAAAAAABAgMEBQb/xAAuEQACAgICAgIBAgUEAwAAAAAAAQIRAyESMQRBEyJRMmEFQnGBkRQjsdFSofD/2gAMAwEAAhEDEQA/AGWpYcG7lJARSxF7diui0RIdxq4gwh+4WJudXTansAC091p3OjcN1gblEYqggnKy55OKMm function esc(s){return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}
function render(){
  const list=document.getElementById('char-list');list.innerHTML='';
  characters.forEach(c=>{
    const imageHtml=c.imageSrc
      ? `<img class="char-img" src="${c.imageSrc}" alt="${esc(c.name)}">`
      : `<div class="img-empty"><svg width="40" height="40" viewBox="0 0 40 40" fill="none"><rect x="4" y="8" width="32" height="24" rx="3" stroke="currentColor" stroke-width="1.5"/><circle cx="14" cy="18" r="3" stroke="currentColor" stroke-width="1.5"/><path d="M4 28l9-7 6 5 5-4 8 7" stroke="currentColor" stroke-width="1.5" stroke-linejoin="round"/></svg></div>`;
    const metaHtml=[
      c.job?   `<div class="meta-item"><span class="meta-label">직업</span><span class="meta-value">${esc(c.job)}</span></div>`:'',
      c.gender?`<div class="meta-item"><span class="meta-label">성별</span><span class="meta-value">${esc(c.gender)}</span></div>`:'',
      c.age?   `<div class="meta-item"><span class="meta-label">나이</span><span class="meta-value">${esc(c.age)}</span></div>`:'',
      c.height?`<div class="meta-item"><span class="meta-label">키</span><span class="meta-value">${esc(c.height)}</span></div>`:'',
    ].filter(Boolean).join('');
    const audioHtml=c.audio.filter(a=>a.filename&&a.filename.trim()).map(a=>`<div class="audio-player-wrap"><audio controls src="${esc(a.filename.trim())}"></audio></div>`).join('');
    const galleryHtml=(c.gallery||[]).map((g,i)=>`<div class="gallery-item" onclick="openLightbox('${g.src}')"><img src="${g.src}" alt="스크린샷 ${i+1}"></div>`).join('');
    const card=document.createElement('div');card.className='character-card';
    card.innerHTML=`
      <div class="card-main">
        <div class="card-image-area">${imageHtml}</div>
        <div class="card-info-area">
          <div class="char-name-row"><span class="char-name">${esc(c.name)}</span><span class="char-tag">${esc(c.tag)}</span></div>
          ${metaHtml?`<div class="char-divider"></div><div class="char-meta">${metaHtml}</div>`:''}
          <div class="char-divider"></div>
          <p class="char-desc">${esc(c.desc).replace(/\n/g,'<br>')}</p>
        </div>
      </div>
      ${audioHtml?`<div class="card-audio-area"><div class="audio-section-label">Voice Samples</div><div class="audio-slots">${audioHtml}</div></div>`:''}
      ${galleryHtml?`<div class="card-gallery-area"><div class="gallery-area-label">Gallery</div><div class="gallery-grid">${galleryHtml}</div></div>`:''}
    `;
    list.appendChild(card);
  });
}
function openLightbox(src){document.getElementById('lightbox-img').src=src;document.getElementById('lightbox').classList.add('open');}
function closeLightbox(){document.getElementById('lightbox').classList.remove('open');}
render();
</script>
</body>
